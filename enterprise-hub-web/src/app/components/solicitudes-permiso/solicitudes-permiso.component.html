<section class="entity-layout">
  <article class="panel-card">
    <div class="section-head">
      <div>
        <p class="section-kicker">Control interno</p>
        <h2>Solicitudes de permiso</h2>
      </div>
      <button class="btn btn-outline-secondary" (click)="resetForm()">Limpiar</button>
    </div>

    <div class="alert alert-light border" *ngIf="feedback">{{ feedback }}</div>

    <form class="row g-3" (ngSubmit)="saveLeaveRequest()">
      <div class="col-md-4">
        <label class="form-label">Empleado</label>
        <select class="form-select" [(ngModel)]="leaveRequestForm.employeeId" name="employeeId" required>
          <option [ngValue]="0">Seleccione</option>
          <option *ngFor="let Empleado of employees" [ngValue]="Empleado.id">{{ Empleado.firstName }} {{ Empleado.lastName }}</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label">Inicio</label>
        <input class="form-control" type="date" [(ngModel)]="leaveRequestForm.startDate" name="startDate" required />
      </div>
      <div class="col-md-2">
        <label class="form-label">Fin</label>
        <input class="form-control" type="date" [(ngModel)]="leaveRequestForm.endDate" name="endDate" required />
      </div>
      <div class="col-md-4">
        <label class="form-label">Estado</label>
        <select class="form-select" [(ngModel)]="leaveRequestForm.status" name="status">
          <option>Pendiente</option>
          <option>Aprobada</option>
          <option>Rechazada</option>
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Motivo</label>
        <input class="form-control" [(ngModel)]="leaveRequestForm.reason" name="reason" required />
      </div>
      <div class="col-12 d-flex gap-2">
        <button class="btn btn-primary" type="submit">{{ leaveRequestForm.id ? 'Actualizar' : 'Registrar' }}</button>
        <button class="btn btn-light" type="button" (click)="resetForm()">Cancelar</button>
      </div>
    </form>
  </article>

  <article class="panel-card">
    <table class="table align-middle mb-0">
      <thead>
        <tr>
          <th>Empleado</th>
          <th>Inicio</th>
          <th>Fin</th>
          <th>Dias</th>
          <th>Estado</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let request of leaveRequests">
          <td>{{ request.employeeName }}</td>
          <td>{{ request.startDate | date:'dd/MM/yyyy' }}</td>
          <td>{{ request.endDate | date:'dd/MM/yyyy' }}</td>
          <td>{{ request.totalDays }}</td>
          <td>{{ request.status }}</td>
          <td class="text-end d-flex gap-2 justify-content-end">
            <button class="btn btn-sm btn-outline-primary" (click)="editLeaveRequest(request)">Editar</button>
            <button class="btn btn-sm btn-outline-danger" (click)="deleteLeaveRequest(request.id)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </article>
</section>
