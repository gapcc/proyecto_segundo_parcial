<section class="entity-layout">
  <article class="panel-card">
    <div class="section-head">
      <div>
        <p class="section-kicker">Estructura organizacional</p>
        <h2>Cargos</h2>
      </div>
      <button class="btn btn-outline-secondary" (click)="resetForm()">Limpiar</button>
    </div>

    <div class="alert alert-light border" *ngIf="feedback">{{ feedback }}</div>

    <form class="row g-3" (ngSubmit)="savePosition()">
      <div class="col-md-5">
        <label class="form-label">Titulo</label>
        <input class="form-control" [(ngModel)]="positionForm.title" name="title" required />
      </div>
      <div class="col-md-4">
        <label class="form-label">Nivel</label>
        <input class="form-control" [(ngModel)]="positionForm.level" name="level" required />
      </div>
      <div class="col-md-3">
        <label class="form-label">Salario base</label>
        <input class="form-control" type="number" [(ngModel)]="positionForm.baseSalary" name="baseSalary" required />
      </div>
      <div class="col-12 d-flex gap-2">
        <button class="btn btn-primary" type="submit">{{ positionForm.id ? 'Actualizar' : 'Registrar' }}</button>
        <button class="btn btn-light" type="button" (click)="resetForm()">Cancelar</button>
      </div>
    </form>
  </article>

  <article class="panel-card">
    <table class="table align-middle mb-0">
      <thead>
        <tr>
          <th>Cargo</th>
          <th>Nivel</th>
          <th>Salario</th>
          <th>Empleados</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let position of positions">
          <td>{{ position.title }}</td>
          <td>{{ position.level }}</td>
          <td>{{ position.baseSalary | currency:'USD' }}</td>
          <td>{{ position.employeeCount }}</td>
          <td class="text-end d-flex gap-2 justify-content-end">
            <button class="btn btn-sm btn-outline-primary" (click)="editPosition(position)">Editar</button>
            <button class="btn btn-sm btn-outline-danger" (click)="deletePosition(position.id)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </article>
</section>
